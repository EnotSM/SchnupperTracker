{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Login</h1>
    <form method="POST" class="space-y-4">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" id="username" required autocomplete="username"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" id="password" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
      </div>
      <button type="submit"
        class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold px-4 py-2.5 rounded-lg transition-colors">
        Login
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account? <a href="/register" class="text-teal-500 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
